<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Templates</title>
    <link rel="stylesheet" href="/resources/css/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <a class="site-brand" href="/">ResumeMaker</a>
          <a class="ghost-action nav-link-button" href="/">Dashboard</a>
        </div>

        <div class="topbar-actions">
          <button class="profile-chip" type="button">
            <span class="profile-avatar">TP</span>
            <span class="profile-copy">
              <strong>Template Gallery</strong>
              <small>Choose a layout</small>
            </span>
          </button>
        </div>
      </header>

      <main class="templates-page-layout">
        <section class="dashboard-card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Template Library</p>
              <h2>Choose a resume template</h2>
            </div>
          </div>
          <p class="support-copy templates-support-copy">
            Preview all available layouts, pick the one you want, and start building from that template.
          </p>
        </section>

        <section class="templates-grid" id="templates-page-grid"></section>
      </main>
    </div>

    <script src="/resources/js/templates-page.js"></script>
  </body>
</html>
